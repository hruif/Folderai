<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">FolderAI local AI refinement interface</title>
  <desc id="desc">A FolderAI prompt panel for local AI guidance and safety controls.</desc>
  <defs>
    <linearGradient id="window" x1="0" y1="0" x2="1400" y2="1040" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182326"/>
      <stop offset="1" stop-color="#0a1113"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1400" height="1040" fill="#080d0e"/>
  <g filter="url(#shadow)" transform="translate(112 98)">
    <rect width="1176" height="844" rx="26" fill="url(#window)" stroke="#2a383b" stroke-width="2"/>
    <rect width="1176" height="76" rx="26" fill="#10191b"/>
    <path d="M0 50 H1176" stroke="#273538" stroke-width="2"/>
    <circle cx="34" cy="37" r="10" fill="#ff7568"/>
    <circle cx="66" cy="37" r="10" fill="#f2c76f"/>
    <circle cx="98" cy="37" r="10" fill="#8ed39d"/>
    <text x="136" y="45" fill="#f5f7f4" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="300">FolderAI</text>

    <rect x="84" y="130" width="1008" height="270" rx="16" fill="#0b1214" stroke="#273538"/>
    <text x="124" y="184" fill="#f5f7f4" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="260">Tell FolderAI how you organize.</text>
    <rect x="124" y="222" width="928" height="96" rx="12" fill="#10191b" stroke="#2a383b"/>
    <text x="154" y="280" fill="#aab6b0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="300">put invoices in Finance, keep PDFs, remove old installers</text>
    <rect x="864" y="334" width="188" height="42" rx="8" fill="#ff8b73"/>
    <text x="909" y="361" fill="#190b07" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="650">Apply request</text>

    <g transform="translate(84 438)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <rect width="304" height="270" rx="16" fill="#0b1214" stroke="#273538"/>
      <text x="34" y="56" fill="#80f2ea" font-size="15" font-weight="520">LOCAL MODEL</text>
      <text x="34" y="104" fill="#f5f7f4" font-size="27" font-weight="260">Runs on your Mac</text>
      <text x="34" y="151" fill="#aab6b0" font-size="17" font-weight="300">File names, content, and OCR text stay on-device.</text>
      <path d="M34 190 H270" stroke="#243235" stroke-width="2"/>
      <text x="34" y="232" fill="#8ed39d" font-size="18" font-weight="320">No cloud account</text>

      <g transform="translate(352 0)">
        <rect width="304" height="270" rx="16" fill="#0b1214" stroke="#273538"/>
        <text x="34" y="56" fill="#80f2ea" font-size="15" font-weight="520">SAFETY</text>
        <text x="34" y="104" fill="#f5f7f4" font-size="27" font-weight="260">Review first</text>
        <text x="34" y="151" fill="#aab6b0" font-size="17" font-weight="300">Every move is staged and editable before execution.</text>
        <path d="M34 190 H270" stroke="#243235" stroke-width="2"/>
        <text x="34" y="232" fill="#f0c96e" font-size="18" font-weight="320">One-click undo</text>
      </g>

      <g transform="translate(704 0)">
        <rect width="304" height="270" rx="16" fill="#0b1214" stroke="#273538"/>
        <text x="34" y="56" fill="#80f2ea" font-size="15" font-weight="520">CLEANUP</text>
        <text x="34" y="104" fill="#f5f7f4" font-size="27" font-weight="260">Quarantine</text>
        <text x="34" y="151" fill="#aab6b0" font-size="17" font-weight="300">Duplicates, installers, and junk are recoverable.</text>
        <path d="M34 190 H270" stroke="#243235" stroke-width="2"/>
        <text x="34" y="232" fill="#ff8b73" font-size="18" font-weight="320">Never permanent</text>
      </g>
    </g>
  </g>
</svg>
